on:
  workflow_dispatch:
jobs:

  nuitka-build:
  
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14.5' # Version range or exact version of a Python version to use, using SemVer's version range syntax
          architecture: 'x64'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
      
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Nuitka Compile
        uses: Nuitka/Nuitka-Action@main
        with:
            nuitka-version: main
            script-name: src/main.py
            mode: onefile
            enable-plugins: tk-inter
            output-file: "PDC"
            windows-console-mode: disable

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: $PDC-{{ runner.os }}-v
          path: |
            build/PDC.exe
            build/PDC
          include-hidden-files: true
